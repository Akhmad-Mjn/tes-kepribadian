<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tes Gaya Kerja & Belajar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .question {
            margin-bottom: 20px;
        }
        .question p {
            font-weight: bold;
        }
        label {
            display: block;
            margin-bottom: 8px;
            cursor: pointer;
        }
        button {
            display: block;
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #2980b9;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #e8f8f5;
            border-left: 5px solid #1abc9c;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tes Tipe Analis & Eksekutor</h1>
    <form id="quizForm">
        
        <div class="question">
            <p>1. Saat menyusun atau meninjau pedoman/modul, apa fokus utama Anda?</p>
            <label><input type="radio" name="q1" value="A" required> A. Memastikan data, angka, dan metodologi sangat akurat.</label>
            <label><input type="radio" name="q1" value="B"> B. Memastikan bahasa mudah dipahami oleh audiens.</label>
            <label><input type="radio" name="q1" value="C"> C. Mencari cara agar pedoman tersebut cepat bisa dipraktikkan di lapangan.</label>
        </div>

        <div class="question">
            <p>2. Saat bekerja dalam tim untuk mengevaluasi sebuah program, Anda cenderung...</p>
            <label><input type="radio" name="q2" value="A"> A. Mengumpulkan matriks dan bukti objektif terlebih dahulu.</label>
            <label><input type="radio" name="q2" value="B"> B. Mengajak tim berdiskusi untuk menyamakan persepsi.</label>
            <label><input type="radio" name="q2" value="C"> C. Langsung membagi tugas dan membuat jadwal (timeline) eksekusi.</label>
        </div>

        <div class="question">
            <p>3. Jika menghadapi masalah birokrasi atau teknis yang mendadak, Anda akan:</p>
            <label><input type="radio" name="q3" value="A"> A. Membaca ulang aturan atau standar operasional yang berlaku.</label>
            <label><input type="radio" name="q3" value="B"> B. Berkonsultasi dengan rekan kerja atau pimpinan.</label>
            <label><input type="radio" name="q3" value="C"> C. Mencari solusi sementara yang paling cepat menyelesaikan masalah.</label>
        </div>

        <button type="button" onclick="calculateResult()">Lihat Hasil</button>
    </form>

    <div id="result">
        <h3 id="resultTitle"></h3>
        <p id="resultDesc"></p>
    </div>
</div>

<script>
    function calculateResult() {
        const form = document.getElementById('quizForm');
        
        // Memeriksa apakah semua pertanyaan sudah dijawab
        if (!form.q1.value || !form.q2.value || !form.q3.value) {
            alert("Harap jawab semua pertanyaan terlebih dahulu.");
            return;
        }

        let scores = { A: 0, B: 0, C: 0 };
        
        scores[form.q1.value]++;
        scores[form.q2.value]++;
        scores[form.q3.value]++;

        let resultType = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);

        let title = "";
        let desc = "";

        if (resultType === 'A') {
            title = "Tipe Analitis & Terstruktur";
            desc = "Anda sangat berorientasi pada data, fakta, dan metode. Anda unggul dalam menyusun dokumen, menganalisis statistik, dan memastikan semuanya berjalan sesuai standar operasi yang tepat.";
        } else if (resultType === 'B') {
            title = "Tipe Komunikator & Kolaborator";
            desc = "Anda mengutamakan kerja sama dan pemahaman bersama. Anda sangat baik dalam mengajar, memfasilitasi diskusi, dan menjaga ritme kerja tim tetap harmonis.";
        } else {
            title = "Tipe Eksekutor Praktis";
            desc = "Anda berorientasi pada tindakan dan hasil nyata di lapangan. Anda efisien, cepat mengambil keputusan, dan pandai mengubah teori menjadi praktik langsung.";
        }

        document.getElementById('resultTitle').innerText = title;
        document.getElementById('resultDesc').innerText = desc;
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
